<!DOCTYPE html>
<html>
<head>
  <title>BULLY</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="images/bully-cover.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="container fade-in">

  <div class="left">
    <img src="images/bully-cover.png" class="cover">

    <h2>BULLY</h2>
    <p>Kanye West / Ye</p>
    <p>42 min</p>
    <p>18 tracks</p>

    <p>
      <a href="https://yzy.lnk.to/bully" target="_blank" class="stream-link">
        STREAM BULLY
      </a>
    </p>
  </div>

  <div class="right" id="playlist"></div>

</div>

<div class="player fade-in">

  <!-- 🔽 CLICK TO OPEN FULL PLAYER -->
  <div class="now-playing" id="title" onclick="openFullscreen()">
    Select a song ⬆
  </div>

  <div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="playPause()" id="playBtn">▶</button>
    <button onclick="nextSong()">⏭</button>
  </div>

  <input type="range" id="progress" value="0">

  <div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
  </div>

</div>

<!-- 🔥 FULLSCREEN PLAYER -->
<div class="fullscreen-player" id="fullscreenPlayer">

  <div class="fullscreen-header">
    <span onclick="closeFullscreen()">⬇</span>
  </div>

  <img src="images/bully-cover.png" class="fullscreen-cover">

  <h2 id="fullscreenTitle">Select a song</h2>

  <div class="fullscreen-controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="playPause()" id="playBtn2">▶</button>
    <button onclick="nextSong()">⏭</button>
  </div>

</div>

<audio id="audio"></audio>

<script src="script.js"></script>
</body>
</html>
