<!DOCTYPE html>
<html>
<head>
  <title>BULLY</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="container fade-in">

  <div class="left">
    <img src="images/bully-cover.jpg" class="cover">

    <h2>BULLY</h2>
    <p>Kanye West / Ye</p>
    <p>42 min</p>
    <p>18 tracks</p>

    <!-- STREAM LINK -->
    <p>
      <a href="https://yzy.lnk.to/bully" target="_blank" class="stream-link">
        STREAM BULLY
      </a>
    </p>
  </div>

  <div class="right" id="playlist"></div>

</div>

<div class="player fade-in">

  <div class="now-playing" id="title">
    Select a song
  </div>

  <div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="playPause()" id="playBtn">▶</button>
    <button onclick="nextSong()">⏭</button>
  </div>

  <input type="range" id="progress" value="0">

  <div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <div class="volume-container">
    🔊
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>

</div>

<audio id="audio"></audio>

<script src="script.js"></script>
</body>
</html>
